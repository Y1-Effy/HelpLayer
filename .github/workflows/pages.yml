name: Deploy demo to GitHub Pages

# Builds the self-contained demo site (npm run build:site -> ./site) and publishes it to GitHub Pages.
# Requires Pages to be enabled once in the repo: Settings -> Pages -> Source: GitHub Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel an in-progress run mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:site
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
